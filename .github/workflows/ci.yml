name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check src tests
      - name: Format check
        run: |
          . .venv/bin/activate
          black --check src tests
      - name: Tests
        run: |
          . .venv/bin/activate
          pytest -q
      - name: OpenAPI contract check
        run: |
          . .venv/bin/activate
          python scripts/export_openapi.py
          git diff --exit-code contracts/openapi.json
